name: Build and Push mclce-runtime

on:
  workflow_dispatch:
  push:
    branches: ["main"]
    paths: ["yolks/mclce-runtime/**"]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login with GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ secrets.GHCR_USERNAME || github.actor }}
          password: ${{ secrets.GHCR_TOKEN || secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          push: true
          context: yolks/mclce-runtime
          file: yolks/mclce-runtime/Dockerfile
          tags: ghcr.io/orisrightpaw/yolks:mclce-runtime
